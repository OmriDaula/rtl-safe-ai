version: 2

updates:
  # npm dependencies across the workspace root.
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '06:00'
    open-pull-requests-limit: 10
    labels:
      - dependencies
    commit-message:
      prefix: deps
      prefix-development: deps-dev
    groups:
      # Bundle low-risk minor/patch bumps into a single PR.
      minor-and-patch:
        update-types:
          - minor
          - patch

  # GitHub Actions used by the workflows above.
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '06:00'
    labels:
      - ci
      - dependencies
    commit-message:
      prefix: ci
    groups:
      actions:
        update-types:
          - minor
          - patch
